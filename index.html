<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rally — Rally</title>
<meta name="description" content="Rally — find your crowd on game day.">
<style>
:root { --navy:#14213D; --red:#E84A50; --ivory:#F7F4EE; --gray:#5a6478; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:var(--navy); background:var(--ivory); line-height:1.65; }
.wrap { max-width:720px; margin:0 auto; padding:48px 24px 96px; }
header a.brand { font-weight:800; font-size:22px; color:var(--navy); text-decoration:none; letter-spacing:.5px; }
header a.brand span { color:var(--red); }
nav { margin-top:8px; }
nav a { color:var(--red); text-decoration:none; margin-right:16px; font-size:14px; font-weight:600; }
h1 { font-size:32px; margin:40px 0 4px; }
.updated { color:var(--gray); font-size:14px; margin-bottom:24px; }
.intro { font-size:17px; margin-bottom:32px; }
h2 { font-size:20px; margin:28px 0 8px; }
p { margin-bottom:12px; }
a { color:var(--red); }
footer { margin-top:64px; padding-top:24px; border-top:1px solid #d9dee5; color:var(--gray); font-size:13px; }
.hero { text-align:center; padding:60px 0 20px; }
.hero h1 { font-size:40px; }
.hero p { font-size:18px; color:var(--gray); max-width:480px; margin:12px auto 0; }
</style>
</head>
<body>
<div class="wrap">
<header>
  <a class="brand" href="/"><span>R</span> RALLY</a>
  <nav><a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/support">Support</a></nav>
</header>
<div class="hero">
<h1><span style="color:var(--red)">R</span> RALLY</h1>
<p>Find your crowd on game day. Discover games, join tailgates and watch parties, and chat with fans like you.</p>
<p style="margin-top:24px">Coming soon to the App Store.</p>
</div>
<footer>© 2026 Rally · Find your crowd on game day · <a href="mailto:support@rallyfindyourcrowd.com">support@rallyfindyourcrowd.com</a></footer>
</div>
</body>
</html>
